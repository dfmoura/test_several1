
<!DOCTYPE html>

             height: 100%;

        /* Linhas de espaço na tabela (evita colapso de células “vazias” no HTML) */
        tr.dfc-row-spacer td {
            height: 1rem;

    </style>
</head>
<body class="p-4">

    <div id="report-container" class="w-full h-full overflow-auto">
        <table class="w-full text-sm" style="border-collapse: collapse;">
            <thead>
                <tr>
                    <th class="text-left font-semibold pb-2 w-2/3 md:w-3/5"></th>
                    <th id="header-ano-atual" class="text-right font-bold pb-2 w-1/6 md:w-1/5 border-b-2 px-4" style="border-color: hsl(var(--foreground));"></th>
                    <th id="header-ano-anterior" class="text-right font-bold pb-2 w-1/6 md:w-1/5 border-b-2 pl-4" style="border-color: hsl(var(--foreground));"></th>
                </tr>
            </thead>
            <tbody id="report-body">
                <tr>
                    <td colspan="3" class="text-center py-10 text-slate-500">Carregando dados do relatório...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const MITRA_UPDATE_EVENT_NAME = 'mitra-update-dfc-report';

        function updateMitra() {
            console.log("Sinal de update para [Relatório DFC] recebido. Disparando evento.");
            document.body.dispatchEvent(new CustomEvent(MITRA_UPDATE_EVENT_NAME));
        }

        function formatValue(value) {
            const num = parseFloat(value);
            if (value === null || value === undefined || isNaN(num) || num === 0) {
                return '-';
            }
            const formatted = new Intl.NumberFormat('pt-BR').format(Math.abs(num));
            return num < 0 ? `(${formatted})` : formatted;
        }

        function headerTokens(h) {
            if (!h || typeof h !== 'object') return [];
            return [h.name, h.label, h.field, h.column, h.key, h.title]
                .filter(v => v != null && String(v).trim() !== '')
                .map(v => String(v).trim().toUpperCase());
        }

        function findColumnIndex(headers, wantedUpper) {
            const w = wantedUpper.toUpperCase();
            return headers.findIndex(h => headerTokens(h).includes(w));
        }

        /** Linhas Mitra: array por índice ou objeto com nomes de coluna */
        function getCell(row, colIndex, headers) {
            if (colIndex < 0) return undefined;
            if (Array.isArray(row)) return row[colIndex];
            if (!row || typeof row !== 'object') return undefined;
            const meta = headers[colIndex];
            const aliases = meta ? headerTokens(meta) : [];
            for (const alias of aliases) {
                for (const k of Object.keys(row)) {
                    if (k.toUpperCase() === alias) return row[k];
                }
            }
            return undefined;
        }

        /** ORDEM raiz 1: "1", "01", "1.0", "1.00", mas não "1.1" */
        function isOrdemRaizUm(raw) {
            const s = String(raw ?? '')
                .trim()
                .replace(/\u00a0/g, ' ')
                .replace(/\s+/g, '');
            if (!s) return false;
            const parts = s.split('.');
            const head = (parts[0] || '').replace(/^0+/, '') || '0';
            if (head !== '1') return false;
            return parts.slice(1).every(p => {
                const n = (p || '').replace(/^0+/, '') || '0';
                return /^0*$/.test(n);
            });
        }

        function isLinhaLucroPrejuizoExercicio(descricao) {
            const d = String(descricao || '')
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');
            return /(lucro|prejuizo)/.test(d) && /exercicio/.test(d);
        }

        /** Grupo 1: ORDEM cujo primeiro segmento é 1 (ex.: 1, 1.1, 1.9.1) — não 2, não 10 */
        function isOrdemNoGrupoUm(ordemRaw) {
            const s = String(ordemRaw ?? '')
                .trim()
                .replace(/\u00a0/g, '')
                .replace(/\s+/g, '');
            if (!s) return false;
            const head = s.split('.')[0].replace(/^0+/, '') || '0';
            return head === '1';
        }

        /** Grupo 2: ORDEM cujo primeiro segmento é 2 (ex.: 2, 2.1, 2.9.1) — não 1, não 20 */
        function isOrdemNoGrupoDois(ordemRaw) {
            const s = String(ordemRaw ?? '')
                .trim()
                .replace(/\u00a0/g, '')
                .replace(/\s+/g, '');
            if (!s) return false;
            const head = s.split('.')[0].replace(/^0+/, '') || '0';
            return head === '2';
        }

        /** Grupo 3: ORDEM cujo primeiro segmento é 3 (ex.: 3, 3.1, 3.9.1) — não 2, não 30 */
        function isOrdemNoGrupoTres(ordemRaw) {
            const s = String(ordemRaw ?? '')
                .trim()
                .replace(/\u00a0/g, '')
                .replace(/\s+/g, '');
            if (!s) return false;
            const head = s.split('.')[0].replace(/^0+/, '') || '0';
            return head === '3';
        }

        /** Grupo 4: ORDEM cujo primeiro segmento é 4 (ex.: 4, 4.1, 4.9.1) — não 3, não 40 */
        function isOrdemNoGrupoQuatro(ordemRaw) {
            const s = String(ordemRaw ?? '')
                .trim()
                .replace(/\u00a0/g, '')
                .replace(/\s+/g, '');
            if (!s) return false;
            const head = s.split('.')[0].replace(/^0+/, '') || '0';
            return head === '4';
        }

        function normalizeOrdem(raw) {
            const s = String(raw ?? '')
                .trim()
                .replace(/\u00a0/g, '')
                .replace(/\s+/g, '');
            if (!s) return '';
            const parts = s.split('.').map(p => {
                const n = String(p || '').replace(/^0+/, '');
                return n === '' ? '0' : n;
            });
            return parts.join('.').replace(/(\.0)+$/g, '');
        }

        function isOrdemExata(raw, target) {
            return normalizeOrdem(raw) === normalizeOrdem(target);
        }

        function somaEUltimoIndiceGrupoUm(data, colMap, headers) {
            let lastIdx = -1;
            let sumAtual = 0;
            let sumAnt = 0;
            data.forEach((row, idx) => {
                const ordemRaw = getCell(row, colMap.ordem, headers);
                if (!isOrdemNoGrupoUm(ordemRaw)) return;
                lastIdx = idx;
                const valorAtual = getCell(row, colMap.valorAtual, headers);
                const valorAnterior = getCell(row, colMap.valorAnterior, headers);
                const hasValues =
                    (valorAtual !== null && valorAtual !== undefined) ||
                    (valorAnterior !== null && valorAnterior !== undefined);
                if (!hasValues) return;
                const na = parseFloat(valorAtual);
                const nb = parseFloat(valorAnterior);
                if (!isNaN(na)) sumAtual += na;
                if (!isNaN(nb)) sumAnt += nb;
            });
            return { lastIdx, sumAtual, sumAnt };
        }

        function somaEUltimoIndiceGrupoDois(data, colMap, headers) {
            let lastIdx = -1;
            let sumAtual = 0;
            let sumAnt = 0;
            data.forEach((row, idx) => {
                const ordemRaw = getCell(row, colMap.ordem, headers);
                if (!isOrdemNoGrupoDois(ordemRaw)) return;
                lastIdx = idx;
                const valorAtual = getCell(row, colMap.valorAtual, headers);
                const valorAnterior = getCell(row, colMap.valorAnterior, headers);
                const hasValues =
                    (valorAtual !== null && valorAtual !== undefined) ||
                    (valorAnterior !== null && valorAnterior !== undefined);
                if (!hasValues) return;
                const na = parseFloat(valorAtual);
                const nb = parseFloat(valorAnterior);
                if (!isNaN(na)) sumAtual += na;
                if (!isNaN(nb)) sumAnt += nb;
            });
            return { lastIdx, sumAtual, sumAnt };
        }

        function somaEUltimoIndiceGrupoTres(data, colMap, headers) {
            let lastIdx = -1;
            let sumAtual = 0;
            let sumAnt = 0;
            data.forEach((row, idx) => {
                const ordemRaw = getCell(row, colMap.ordem, headers);
                if (!isOrdemNoGrupoTres(ordemRaw)) return;
                lastIdx = idx;
                const valorAtual = getCell(row, colMap.valorAtual, headers);
                const valorAnterior = getCell(row, colMap.valorAnterior, headers);
                const hasValues =
                    (valorAtual !== null && valorAtual !== undefined) ||
                    (valorAnterior !== null && valorAnterior !== undefined);
                if (!hasValues) return;
                const na = parseFloat(valorAtual);
                const nb = parseFloat(valorAnterior);
                if (!isNaN(na)) sumAtual += na;
                if (!isNaN(nb)) sumAnt += nb;
            });
            return { lastIdx, sumAtual, sumAnt };
        }

        function somaEUltimoIndiceGrupoQuatro(data, colMap, headers) {
            let lastIdx = -1;
            let sumAtual = 0;
            let sumAnt = 0;
            data.forEach((row, idx) => {
                const ordemRaw = getCell(row, colMap.ordem, headers);
                if (!isOrdemNoGrupoQuatro(ordemRaw)) return;
                lastIdx = idx;
                const valorAtual = getCell(row, colMap.valorAtual, headers);
                const valorAnterior = getCell(row, colMap.valorAnterior, headers);
                const hasValues =
                    (valorAtual !== null && valorAtual !== undefined) ||
                    (valorAnterior !== null && valorAnterior !== undefined);
                if (!hasValues) return;
                const na = parseFloat(valorAtual);
                const nb = parseFloat(valorAnterior);
                if (!isNaN(na)) sumAtual += na;
                if (!isNaN(nb)) sumAnt += nb;
            });
            return { lastIdx, sumAtual, sumAnt };
        }

        function appendSubtotalGrupoUm(fragment, sumAtual, sumAnt) {
            const tr = document.createElement('tr');
            const tdDesc = document.createElement('td');
            tdDesc.className = 'py-1.5 pr-4';
            tdDesc.textContent = '';

            const tdValAtual = document.createElement('td');
            tdValAtual.className = 'py-1.5 px-4 text-right font-mono font-bold border-t';
            tdValAtual.style.borderColor = 'hsl(var(--foreground))';
            tdValAtual.textContent = formatValue(sumAtual);

            const tdValAnterior = document.createElement('td');
            tdValAnterior.className = 'py-1.5 pl-4 text-right font-mono font-bold border-t';
            tdValAnterior.style.borderColor = 'hsl(var(--foreground))';
            tdValAnterior.textContent = formatValue(sumAnt);

            tr.appendChild(tdDesc);
            tr.appendChild(tdValAtual);
            tr.appendChild(tdValAnterior);
            fragment.appendChild(tr);
        }

        function appendTotalCaixaLiquidoOperacional(fragment, sumAtual, sumAnt) {
            const tr = document.createElement('tr');

            const tdDesc = document.createElement('td');
            tdDesc.className = 'py-1.5 pr-4 font-bold';

            const tdValAtual = document.createElement('td');

        }

        function appendTotalCaixaLiquidoInvestimentos(fragment, sumAtual, sumAnt) {
            const tr = document.createElement('tr');

            const tdDesc = document.createElement('td');
            tdDesc.className = 'py-1.5 pr-4 font-bold';

            const tdValAtual = document.createElement('td');

        function appendTotalCaixaFinanciamentos(fragment, sumAtual, sumAnt) {
            const tr = document.createElement('tr');

            const tdDesc = document.createElement('td');
            tdDesc.className = 'py-1.5 pr-4 font-bold';

            const tdValAtual = document.createElement('td');

        function appendAumentoCaixaEquivalentes(fragment, sumAtual, sumAnt, descricaoOverride) {
            const tr = document.createElement('tr');

            const tdDesc = document.createElement('td');
            tdDesc.className = 'py-1.5 pr-4 font-bold';
            tdDesc.textContent = (descricaoOverride ?? 'Aumento de caixa e equivalentes de caixa');

            const tdValAtual = document.createElement('td');
            tdValAtual.className = 'py-1.5 px-4 text-right font-mono font-bold border-t';
            tdValAtual.style.borderColor = 'hsl(var(--foreground))';

            tr.appendChild(tdDesc);
            tr.appendChild(tdValAtual);

        }

        function appendBlocoAjusteOperacional(fragment) {
            function spacerTr() {
                const r = document.createElement('tr');
                r.className = 'dfc-row-spacer';
                const c = document.createElement('td');
                c.colSpan = 3;
                c.innerHTML = '&nbsp;';
                r.appendChild(c);
                fragment.appendChild(r);
            }
            spacerTr();
            const adjustmentTitleRow = document.createElement('tr');
            const adjustmentTitleCell = document.createElement('td');
            adjustmentTitleCell.colSpan = 3;
            adjustmentTitleCell.className = 'py-1.5 pr-4';
            adjustmentTitleCell.textContent =
                'Ajuste para reconciliar o prejuízo do exercício com os recursos provenientes das atividades operacionais';
            adjustmentTitleRow.appendChild(adjustmentTitleCell);
            fragment.appendChild(adjustmentTitleRow);
            spacerTr();
        }

        function renderReport(data, headers) {
            const tbody = document.getElementById('report-body');
            tbody.innerHTML = '';
            
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center py-10 text-slate-500">Nenhum dado encontrado para os filtros selecionados.</td></tr>';
                return;
            }

            const colMap = {
                ordem: findColumnIndex(headers, 'ORDEM'),
                descricao: findColumnIndex(headers, 'DESCRICAO'),
                valorAtual: findColumnIndex(headers, 'VALOR_ANO_ATUAL'),
                valorAnterior: findColumnIndex(headers, 'VALOR_ANO_ANTERIOR'),
            };

            if (Object.values(colMap).some(index => index === -1)) {
                console.error(
                    'Erro de mapeamento de colunas. A query deve retornar: ORDEM, DESCRICAO, VALOR_ANO_ATUAL, VALOR_ANO_ANTERIOR.',
                    headers.map(h => headerTokens(h)[0] || h)
                );
                tbody.innerHTML = `<tr><td colspan="3" class="text-center py-10 text-red-600">Erro: A query configurada não retorna as colunas esperadas.</td></tr>`;
                return;
            }

            const fragment = document.createDocumentFragment();

            const titleRow = document.createElement('tr');
            const titleCell = document.createElement('td');
            titleCell.colSpan = 3;
            titleCell.className = 'py-1.5 pr-4 font-bold pt-5';
            titleCell.textContent = 'Fluxo de caixa das atividades operacionais';
            titleRow.appendChild(titleCell);
            fragment.appendChild(titleRow);

            let blocoAjusteInserido = false;
            let tituloGrupo21Inserido = false;
            let tituloGrupo31Inserido = false;
            let tituloGrupo41Inserido = false;
            const { lastIdx: lastIdxGrupoUm, sumAtual: sumGrupoUmAtual, sumAnt: sumGrupoUmAnt } =
                somaEUltimoIndiceGrupoUm(data, colMap, headers);
            const { lastIdx: lastIdxGrupoDois, sumAtual: sumGrupoDoisAtual, sumAnt: sumGrupoDoisAnt } =
                somaEUltimoIndiceGrupoDois(data, colMap, headers);
            const { lastIdx: lastIdxGrupoTres, sumAtual: sumGrupoTresAtual, sumAnt: sumGrupoTresAnt } =
                somaEUltimoIndiceGrupoTres(data, colMap, headers);
            const { lastIdx: lastIdxGrupoQuatro, sumAtual: sumGrupoQuatroAtual, sumAnt: sumGrupoQuatroAnt } =
                somaEUltimoIndiceGrupoQuatro(data, colMap, headers);

            const aumentoCaixaAtual =
                (sumGrupoUmAtual + sumGrupoDoisAtual) + sumGrupoTresAtual + sumGrupoQuatroAtual;
            const aumentoCaixaAnt =
                (sumGrupoUmAnt + sumGrupoDoisAnt) + sumGrupoTresAnt + sumGrupoQuatroAnt;

            let aumentoReplicadoAposGrupo52 = false;

            data.forEach((row, rowIndex) => {
                const tr = document.createElement('tr');

                const ordemRaw = getCell(row, colMap.ordem, headers);
                const ordem = ordemRaw !== undefined && ordemRaw !== null ? String(ordemRaw).trim() : '';
                const descricao = getCell(row, colMap.descricao, headers) || '';
                const valorAtual = getCell(row, colMap.valorAtual, headers);
                const valorAnterior = getCell(row, colMap.valorAnterior, headers);

                if (!tituloGrupo21Inserido && isOrdemExata(ordemRaw, '2.1')) {
                    tituloGrupo21Inserido = true;
                    const r = document.createElement('tr');
                    const c = document.createElement('td');
                    c.colSpan = 3;
                    c.className = 'py-1.5 pr-4 font-bold pt-5';
                    c.textContent = 'Variação nos ativos e passivos operacionais';
                    r.appendChild(c);
                    fragment.appendChild(r);
                }

                if (!tituloGrupo31Inserido && isOrdemExata(ordemRaw, '3.1')) {
                    tituloGrupo31Inserido = true;
                    const r = document.createElement('tr');
                    const c = document.createElement('td');
                    c.colSpan = 3;
                    c.className = 'py-1.5 pr-4 font-bold pt-5';
                    c.textContent = 'Fluxo de caixa das atividades de investimentos';
                    r.appendChild(c);
                    fragment.appendChild(r);
                }

                if (!tituloGrupo41Inserido && isOrdemExata(ordemRaw, '4.1')) {
                    tituloGrupo41Inserido = true;
                    const r = document.createElement('tr');
                    const c = document.createElement('td');
                    c.colSpan = 3;
                    c.className = 'py-1.5 pr-4 font-bold pt-5';
                    c.textContent = 'Fluxo de caixa das atividades de financiamentos';
                    r.appendChild(c);
                    fragment.appendChild(r);
                }

                const hasValues = (valorAtual !== null && valorAtual !== undefined) || (valorAnterior !== null && valorAnterior !== undefined);
                const isTotal = descricao.toLowerCase().includes('caixa líquido') || 
                                descricao.toLowerCase().includes('caixa gerado') || 
                                descricao.toLowerCase().includes('aumento de caixa e equivalentes');

                let tdDesc = document.createElement('td');
                tdDesc.className = 'py-1.5 pr-4';

                if (hasValues) {
                    const indentLevel = (ordem.split('.').length - 1);
                    if (indentLevel > 0) {
                        tdDesc.style.paddingLeft = `${indentLevel * 2}rem`; // Aumenta o recuo
                    }
                } else {
                    tr.className += ' h-4'; // Add space before section titles
                    tdDesc.className += ' pt-5'; // Add more space
                }
                
                if (isTotal || !hasValues) {
                     tdDesc.classList.add('font-bold');
                }

                tdDesc.textContent = descricao;

                let tdValAtual = document.createElement('td');
                tdValAtual.className = 'py-1.5 px-4 text-right font-mono';
                tdValAtual.textContent = hasValues ? formatValue(valorAtual) : '';
                
                let tdValAnterior = document.createElement('td');
                tdValAnterior.className = 'py-1.5 pl-4 text-right font-mono';
                tdValAnterior.textContent = hasValues ? formatValue(valorAnterior) : '';

                if (isTotal) {
                    tdDesc.classList.add('font-bold');
                    tdValAtual.classList.add('font-bold', 'border-t');
                    tdValAnterior.classList.add('font-bold', 'border-t');
                    tdValAtual.style.borderColor = 'hsl(var(--foreground))';
                    tdValAnterior.style.borderColor = 'hsl(var(--foreground))';
                }

                tr.appendChild(tdDesc);
                tr.appendChild(tdValAtual);
                tr.appendChild(tdValAnterior);
                
                fragment.appendChild(tr);

                // Ao final do total do GRUPO 5.2: pula uma linha e replica "Aumento de caixa e equivalentes de caixa"
                const descNorm = String(descricao || '')
                    .toLowerCase()
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '');
                const ordNorm = normalizeOrdem(ordemRaw);
                const isGrupo52 =
                    isOrdemExata(ordemRaw, '5.2') ||
                    ordNorm === '5.2' ||
                    ordNorm.startsWith('5.2.');
                const isTotalRelacionadoAo52 =
                    (/total/.test(descNorm) && /5\.2/.test(descNorm)) ||
                    (/grupo/.test(descNorm) && /5\.2/.test(descNorm)) ||
                    (isGrupo52 && isTotal);
                if (!aumentoReplicadoAposGrupo52 && hasValues && isTotalRelacionadoAo52) {
                    aumentoReplicadoAposGrupo52 = true;
                    const sp = document.createElement('tr');
                    sp.className = 'dfc-row-spacer';
                    const sc = document.createElement('td');
                    sc.colSpan = 3;
                    sc.innerHTML = '&nbsp;';
                    sp.appendChild(sc);
                    fragment.appendChild(sp);

                    appendAumentoCaixaEquivalentes(
                        fragment,
                        aumentoCaixaAtual,
                        aumentoCaixaAnt,
                        'Aumento de caixa e equivalentes de caixa'
                    );
                }

                if (!blocoAjusteInserido) {
                    const porOrdem = isOrdemRaizUm(ordemRaw);
                    const porDescricao = isLinhaLucroPrejuizoExercicio(descricao);
                    if (porOrdem || porDescricao) {
                        blocoAjusteInserido = true;
                        appendBlocoAjusteOperacional(fragment);
                    }
                }

                if (lastIdxGrupoUm >= 0 && rowIndex === lastIdxGrupoUm) {
                    appendSubtotalGrupoUm(fragment, sumGrupoUmAtual, sumGrupoUmAnt);
                    const sp = document.createElement('tr');
                    sp.className = 'dfc-row-spacer';
                    const sc = document.createElement('td');
                    sc.colSpan = 3;
                    sc.innerHTML = '&nbsp;';
                    sp.appendChild(sc);
                    fragment.appendChild(sp);
                }

                if (lastIdxGrupoDois >= 0 && rowIndex === lastIdxGrupoDois) {
                    appendTotalCaixaLiquidoOperacional(
                        fragment,
                        sumGrupoUmAtual + sumGrupoDoisAtual,
                        sumGrupoUmAnt + sumGrupoDoisAnt
                    );
                    const sp = document.createElement('tr');
                    sp.className = 'dfc-row-spacer';
                    const sc = document.createElement('td');
                    sc.colSpan = 3;
                    sc.innerHTML = '&nbsp;';
                    sp.appendChild(sc);
                    fragment.appendChild(sp);
                }

                if (lastIdxGrupoTres >= 0 && rowIndex === lastIdxGrupoTres) {
                    appendTotalCaixaLiquidoInvestimentos(fragment, sumGrupoTresAtual, sumGrupoTresAnt);
                    const sp = document.createElement('tr');
                    sp.className = 'dfc-row-spacer';
                    const sc = document.createElement('td');
                    sc.colSpan = 3;
                    sc.innerHTML = '&nbsp;';
                    sp.appendChild(sc);
                    fragment.appendChild(sp);
                }

                if (lastIdxGrupoQuatro >= 0 && rowIndex === lastIdxGrupoQuatro) {
                    appendTotalCaixaFinanciamentos(fragment, sumGrupoQuatroAtual, sumGrupoQuatroAnt);
                    const sp = document.createElement('tr');
                    sp.className = 'dfc-row-spacer';
                    const sc = document.createElement('td');
                    sc.colSpan = 3;
                    sc.innerHTML = '&nbsp;';
                    sp.appendChild(sc);
                    fragment.appendChild(sp);

                    appendAumentoCaixaEquivalentes(fragment, aumentoCaixaAtual, aumentoCaixaAnt);

                    const sp2 = document.createElement('tr');
                    sp2.className = 'dfc-row-spacer';
                    const sc2 = document.createElement('td');
                    sc2.colSpan = 3;
                    sc2.innerHTML = '&nbsp;';
                    sp2.appendChild(sc2);
                    fragment.appendChild(sp2);
                }
            });

            // Fallback: se não existir/for detectado o total do GRUPO 5.2, garante a repetição no final de tudo.
            if (!aumentoReplicadoAposGrupo52) {
                const sp = document.createElement('tr');
                sp.className = 'dfc-row-spacer';
                const sc = document.createElement('td');
                sc.colSpan = 3;
                sc.innerHTML = '&nbsp;';
                sp.appendChild(sc);
                fragment.appendChild(sp);

                appendAumentoCaixaEquivalentes(
                    fragment,
                    aumentoCaixaAtual,
                    aumentoCaixaAnt,
                    'Aumento de caixa e equivalentes de caixa'
                );
            }

            tbody.appendChild(fragment);
        }

        async function loadDataAndRender() {
            const container = document.getElementById('report-container');
            container.querySelector('tbody').innerHTML = '<tr><td colspan="3" class="text-center py-10 text-slate-500">Carregando...</td></tr>';

            try {
                if (!componentData.varMes) {
                    throw new Error("A variável 'varMes' não foi configurada no componentData.");
                }
                
                const dateResult = await queryMitra({ query: `SELECT ${componentData.varMes} FROM DUAL` });
                const dateString = dateResult.data && dateResult.data[0] ? dateResult.data[0][0] : new Date().toISOString();
                const refDate = new Date(dateString.split(' ')[0]);
                
                const currentYear = refDate.getFullYear();
                const previousYear = currentYear - 1;

                document.getElementById('header-ano-atual').textContent = currentYear;
                document.getElementById('header-ano-anterior').textContent = previousYear;

                if (!componentData.queryDados) {
                    throw new Error("A variável 'queryDados' não foi configurada no componentData.");
                }

                const result = await queryMitra({ query: componentData.queryDados });
                renderReport(result.data, result.headers);

            } catch (error) {
                console.error("Falha ao carregar o relatório DFC:", error);
                container.innerHTML = `<div class="p-8 text-center text-red-700 bg-red-50 h-full flex items-center justify-center">Ocorreu um erro ao carregar o relatório: ${error.message}</div>`;
            }
        }

        function initializeComponent() {
            document.body.addEventListener(MITRA_UPDATE_EVENT_NAME, loadDataAndRender);
            loadDataAndRender();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const waitForMitraAndInit = () => {
                const maxWaitTime = 5000;
                const intervalTime = 100;
                const startTime = Date.now();

                const checkInterval = setInterval(() => {
                    if (window.componentData && window.componentData.queryDados && window.componentData.varMes) {
                        clearInterval(checkInterval);
                        initializeComponent();
                    } else if (Date.now() - startTime > maxWaitTime) {
                        clearInterval(checkInterval);
                        console.error("Erro: As configurações do componente (componentData) não foram carregadas a tempo.");
                        document.getElementById('report-container').innerHTML = `<div class="p-8 text-center text-red-700 bg-red-50 h-full flex items-center justify-center">Erro Crítico: As configurações do componente (queryDados, varMes) não foram carregadas da plataforma.</div>`;
                    }
                }, intervalTime);
            };

            waitForMitraAndInit();
        });
    </script>
</body>
</html>
