
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demonstração do Resultado Abrangente</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --primary: 222.2 47.4% 11.2%;
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96.1%;
            --secondary-foreground: 222.2 84% 4.9%;
            --muted: 210 40% 96.1%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --accent: 210 40% 96.1%;
            --accent-foreground: 222.2 84% 4.9%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 210 40% 98%;
            --border: 214.3 31.8% 91.4%;
            --input: 214.3 31.8% 91.4%;
            --ring: 222.2 84% 4.9%;
            --radius: 0.5rem;
        }

        .dark {
            --background: 222.2 84% 4.9%;
            --foreground: 210 40% 98%;
            --primary: 210 40% 98%;
            --primary-foreground: 222.2 47.4% 11.2%;
            --secondary: 217.2 32.6% 17.5%;
            --secondary-foreground: 210 40% 98%;
            --muted: 217.2 32.6% 17.5%;
            --muted-foreground: 215 20.2% 65.1%;
            --accent: 217.2 32.6% 17.5%;
            --accent-foreground: 210 40% 98%;
            --destructive: 0 62.8% 30.6%;
            --destructive-foreground: 210 40% 98%;
            --border: 217.2 32.6% 17.5%;
            --input: 217.2 32.6% 17.5%;
            --ring: 212.7 26.8% 83.9%;
        }

        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: sans-serif;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body class="h-full w-full">
    <div id="report-container" class="h-full w-full p-6 box-border">
        <!-- O conteúdo será renderizado aqui pelo JavaScript -->
    </div>

    <script>
        const MITRA_UPDATE_EVENT_NAME = 'mitra-update-dra-report';

        function updateMitra() {
            console.log("Sinal de update para [DRA Report] recebido. Disparando evento.");
            document.body.dispatchEvent(new CustomEvent(MITRA_UPDATE_EVENT_NAME));
        }

        document.addEventListener('DOMContentLoaded', () => {
            const reportContainer = document.getElementById('report-container');

            const formatNumber = (value) => {
                const num = parseFloat(value);
                if (isNaN(num)) {
                    return '0';
                }
                return new Intl.NumberFormat('pt-BR', {
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 0
                }).format(num);
            };

            const setLoadingState = () => {
                reportContainer.innerHTML = `
                    <div class="text-center text-muted-foreground">
                        <svg class="animate-spin h-8 w-8 text-primary mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Carregando...
                    </div>`;
            };

            const setErrorState = (message) => {
                reportContainer.innerHTML = `<div class="p-8 text-center text-destructive bg-destructive/10 h-full flex items-center justify-center">${message}</div>`;
            };

            async function renderReport() {
                setLoadingState();

                try {
                    const jdbcId = parseInt(componentData.jdbcId, 10);
                    if (isNaN(jdbcId)) {
                        throw new Error("A variável 'jdbcId' não foi configurada ou é inválida.");
                    }

                    // 1. Obter a data de referência para calcular os anos
                    const dateQuery = `SELECT ${componentData.varMes} FROM DUAL`;
                    const dateResult = await queryMitra({ query: dateQuery, jdbcId: jdbcId });
                    
                    if (!dateResult || !dateResult.data || dateResult.data.length === 0 || !dateResult.data[0][0]) {
                        throw new Error(`A variável Mitra '${componentData.varMes}' não retornou uma data válida.`);
                    }

                    const referenceDateStr = dateResult.data[0][0];
                    const referenceDate = new Date(referenceDateStr);
                    if (isNaN(referenceDate.getTime())) {
                        throw new Error(`O valor retornado por '${componentData.varMes}' ('${referenceDateStr}') não é uma data reconhecida.`);
                    }
                    
                    const currentYear = referenceDate.getFullYear();
                    const previousYear = currentYear - 1;

                    // 2. Obter os dados do relatório
                    const dataResult = await queryMitra({ query: componentData.queryDados, jdbcId: jdbcId });

                    if (!dataResult || !dataResult.data || dataResult.data.length === 0) {
                        setErrorState("A consulta não retornou dados.");
                        return;
                    }

                    const headers = dataResult.headers.map(h => h.name.toUpperCase());
                    const valorAtualIndex = headers.indexOf('VALOR_ATUAL');
                    const valorAnteriorIndex = headers.indexOf('VALOR_ANTERIOR');

                    if (valorAtualIndex === -1 || valorAnteriorIndex === -1) {
                        throw new Error("A query de dados deve retornar as colunas 'VALOR_ATUAL' e 'VALOR_ANTERIOR'.");
                    }

                    const firstRow = dataResult.data[0];
                    const valorAtual = firstRow[valorAtualIndex];
                    const valorAnterior = firstRow[valorAnteriorIndex];

                    const formattedValorAtual = formatNumber(valorAtual);
                    const formattedValorAnterior = formatNumber(valorAnterior);

                    // 3. Montar o HTML do relatório
                    const reportHTML = `
                        <div class="w-full max-w-xl space-y-3 text-sm text-foreground">
                            <!-- Cabeçalho -->
                            <div class="grid grid-cols-[1fr_100px_100px] gap-x-4 font-bold text-right">
                                <span></span>
                                <div class="border-b border-foreground pb-1">${currentYear}</div>
                                <div class="border-b border-foreground pb-1">${previousYear}</div>
                            </div>
                    
                            <!-- Linha 1: Lucro líquido -->
                            <div class="grid grid-cols-[1fr_100px_100px] gap-x-4 items-center">
                                <span class="text-left">Lucro líquido do exercício</span>
                                <span class="text-right">${formattedValorAtual}</span>
                                <span class="text-right">${formattedValorAnterior}</span>
                            </div>
                    
                            <!-- Linha 2: Outros resultados -->
                            <div class="grid grid-cols-[1fr_100px_100px] gap-x-4 items-center">
                                <span class="text-left">Outros resultados abrangentes</span>
                                <span class="text-right">-</span>
                                <span class="text-right">-</span>
                            </div>
                    
                            <!-- Linha 3: Total -->
                            <div class="grid grid-cols-[1fr_100px_100px] gap-x-4 items-center font-bold">
                                <span class="text-left">Resultado abrangente do exercício</span>
                                <div class="text-right border-b-4 border-double border-foreground pb-1">${formattedValorAtual}</div>
                                <div class="text-right border-b-4 border-double border-foreground pb-1">${formattedValorAnterior}</div>
                            </div>
                        </div>
                    `;

                    reportContainer.innerHTML = reportHTML;

                } catch (error) {
                    console.error("Falha ao renderizar o relatório DRA:", error);
                    setErrorState(`Erro ao carregar dados: ${error.message}`);
                }
            }
            
            document.body.addEventListener(MITRA_UPDATE_EVENT_NAME, renderReport);
            
            const waitForMitraAndInit = () => {
                const maxWaitTime = 5000; // 5 segundos
                const intervalTime = 100; // Verifica a cada 100ms
                const startTime = Date.now();

                const checkInterval = setInterval(() => {
                    if (window.componentData && window.componentData.queryDados && window.componentData.varMes && window.componentData.jdbcId) {
                        clearInterval(checkInterval);
                        renderReport();
                    } else if (Date.now() - startTime > maxWaitTime) {
                        clearInterval(checkInterval);
                        const errorMessage = "Erro Crítico: As configurações obrigatórias (queryDados, varMes, jdbcId) do componente não foram carregadas da plataforma.";
                        console.error(errorMessage);
                        setErrorState(errorMessage);
                    }
                }, intervalTime);
            };

            waitForMitraAndInit();
        });
    </script>
</body>
</html>
