services:
  nfse:
    build:
      context: ../..
      dockerfile: 21/nfse-simples/Dockerfile
    container_name: nfse-simples
    ports:
      - "${NFSE_PORT:-18210}:18210"
    env_file:
      - .env
    environment:
      NFSE_PORT: "18210"
      NFSE_DATA_DIR: /app/data
      NFSE_CERT_PATH: /run/secrets/certificado.pfx
      NFSE_CERT_PASSWORD_FILE: /run/secrets/certificado.senha
    volumes:
      - nfse-data:/app/data
      - ./secrets:/run/secrets:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18210/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  nfse-data:
