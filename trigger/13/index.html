<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trigger Data Intelligence</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8f9fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1a2b4a;
    }

    main {
      text-align: center;
      padding: 2rem;
    }

    .logo {
      max-width: min(420px, 85vw);
      height: auto;
      margin-bottom: 2.5rem;
    }

    a {
      color: #1a2b4a;
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.02em;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }

    a:hover {
      border-bottom-color: #7bc142;
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="assets/logo.png" alt="Trigger Data Intelligence">
    <a href="mailto:diogo.moura@triggerti.com">diogo.moura@triggerti.com</a>
  </main>
</body>
</html>
