
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRE - Demonstrativo de Resultado do Exercício</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --primary: 222.2 47.4% 11.2%;
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96.1%;
            --secondary-foreground: 222.2 84% 4.9%;
            --muted: 210 40% 96.1%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --accent: 210 40% 96.1%;
            --accent-foreground: 222.2 84% 4.9%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 210 40% 98%;
            --border: 214.3 31.8% 91.4%;
            --input: 214.3 31.8% 91.4%;
            --ring: 222.2 84% 4.9%;
            --radius: 0.5rem;
        }

        .dark {
            --background: 222.2 84% 4.9%;
            --foreground: 210 40% 98%;
            --primary: 210 40% 98%;
            --primary-foreground: 222.2 47.4% 11.2%;
            --secondary: 217.2 32.6% 17.5%;
            --secondary-foreground: 210 40% 98%;
            --muted: 217.2 32.6% 17.5%;
            --muted-foreground: 215 20.2% 65.1%;
            --accent: 217.2 32.6% 17.5%;
            --accent-foreground: 210 40% 98%;
            --destructive: 0 62.8% 30.6%;
            --destructive-foreground: 210 40% 98%;
            --border: 217.2 32.6% 17.5%;
            --input: 217.2 32.6% 17.5%;
            --ring: 212.7 26.8% 83.9%;
        }

        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }
        .total-row {
            background-color: hsl(var(--secondary));
        }
    </style>
</head>
<body class="font-sans">
    <div id="dre-container" class="h-full w-full bg-background text-foreground flex flex-col">
        <main class="flex-grow overflow-y-auto">
            <div id="report-content" class="p-4">
                <table class="w-full text-sm">
                    <thead class="sticky top-0 bg-background z-10">
                        <tr>
                            <th class="text-left font-semibold p-2 w-2/4 border-b-2 border-primary">Conta Gerencial</th>
                            <th class="text-right font-semibold p-2 border-b-2 border-primary" id="header-current-year"></th>
                            <th class="text-right font-semibold p-2 border-b-2 border-primary" id="header-previous-year"></th>
                        </tr>
                    </thead>
                    <tbody id="report-body">
                        <!-- Rows will be injected by JavaScript -->
                    </tbody>
                </table>
                 <div id="loading-state" class="p-8 text-center text-muted-foreground">Carregando dados...</div>
            </div>
        </main>
    </div>
    
    <script>
        const MITRA_UPDATE_EVENT_NAME = 'mitra-update-dre-report-component';

        function updateMitra() {
            console.log("Sinal de update para [DRE Report] recebido. Disparando evento.");
            document.body.dispatchEvent(new CustomEvent(MITRA_UPDATE_EVENT_NAME));
        }

        document.addEventListener('DOMContentLoaded', () => {
            const reportBody = document.getElementById('report-body');
            const loadingState = document.getElementById('loading-state');
    
            function formatCurrency(value) {
                const num = Number(value) || 0;
                const formatted = new Intl.NumberFormat('pt-BR', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }).format(Math.abs(num));
                return num < 0 ? `(${formatted})` : formatted;
            }

            function createRow(level, description, value_current, value_previous, isBold = false, isTotal = false, isNegative = false) {
                const paddingLeft = (level > 0 ? level -1 : 0) * 1.5;
                const fontWeight = isBold ? 'font-semibold' : 'font-normal';
                const totalClass = isTotal ? 'total-row' : '';
                
                const valueCurrentText = formatCurrency(value_current);
                const valuePreviousText = formatCurrency(value_previous);
                
                const isCurrentNegativeForClass = (Number(value_current) < 0 || isNegative);
                const isPreviousNegativeForClass = (Number(value_previous) < 0 || isNegative);
                
                const textColorCurrent = isCurrentNegativeForClass ? 'text-destructive' : 'text-foreground';
                const textColorPrevious = isPreviousNegativeForClass ? 'text-destructive' : 'text-foreground';

                return `
                    <tr class="border-b border-border/50 ${totalClass}">
                        <td class="py-2 px-2 ${fontWeight}" style="padding-left: ${paddingLeft + 0.5}rem;">${description}</td>
                        <td class="py-2 px-2 text-right ${fontWeight} ${textColorCurrent}">${valueCurrentText}</td>
                        <td class="py-2 px-2 text-right ${fontWeight} ${textColorPrevious}">${valuePreviousText}</td>
                    </tr>
                `;
            }

            function createSpacerRow() {
                return `<tr class="h-4"><td colspan="3"></td></tr>`;
            }

            async function renderReport() {
                loadingState.style.display = 'block';
                reportBody.innerHTML = '';

                try {
                    // Determine and set dynamic headers from Mitra variable
                    const mesResult = await queryMitra({ query: `SELECT ${componentData.varMes}` });
                    if (!mesResult || !mesResult.data || !mesResult.data[0] || !mesResult.data[0][0]) {
                        throw new Error(`Não foi possível obter o valor da variável de data: ${componentData.varMes}`);
                    }
                    const mesValue = mesResult.data[0][0];
                    const datePart = mesValue.split(' ')[0]; // Pega 'YYYY-MM-DD'
                    const referenceDate = new Date(datePart + 'T00:00:00'); // Adiciona T00:00:00 para evitar problemas de fuso
                    if (isNaN(referenceDate.getTime())) {
                        throw new Error(`Data de referência inválida: \"${mesValue}\"`);
                    }
                    const currentYear = referenceDate.getFullYear();
                    const previousYear = currentYear - 1;
                    document.getElementById('header-current-year').textContent = String(currentYear);
                    document.getElementById('header-previous-year').textContent = String(previousYear);
                    
                    const result = await queryMitra({
                        query: componentData.query,
                        jdbcId: parseInt(componentData.jdbcId || '1', 10)
                    });

                    if (!result || !result.data || result.data.length === 0) {
                        loadingState.textContent = 'Nenhum dado encontrado para o período selecionado.';
                        return;
                    }
                    
                    const headers = result.headers.map(h => h.name.toUpperCase());
                    const colMap = {
                        ordem: headers.indexOf('ORDEM'),
                        nome: headers.indexOf('NOME_GRUPO'),
                        atual: headers.indexOf('VALOR_ATUAL'),
                        anterior: headers.indexOf('VALOR_ANTERIOR'),
                    };

                    if (Object.values(colMap).some(index => index === -1)) {
                        throw new Error(`Query inválida. Colunas esperadas: ORDEM, NOME_GRUPO, VALOR_ATUAL, VALOR_ANTERIOR. Recebido: ${headers.join(', ')}`);
                    }

                    const data = result.data.map(row => ({
                        hierarquia: row[colMap.ordem] || '',
                        descricao: row[colMap.nome] || '',
                        valor_atual: parseFloat(row[colMap.atual]) || 0,
                        valor_anterior: parseFloat(row[colMap.anterior]) || 0,
                    })).sort((a, b) => a.hierarquia.localeCompare(b.hierarquia, undefined, { numeric: true }));

                    const totals = {
                        receita_bruta: { atual: 0, anterior: 0 },
                        receita_liquida: { atual: 0, anterior: 0 },
                        csp: { atual: 0, anterior: 0 },
                        despesas_op: { atual: 0, anterior: 0 },
                        despesas_admin: { atual: 0, anterior: 0 },
                        despesas_comerc: { atual: 0, anterior: 0 },
                        pecld: { atual: 0, anterior: 0 },
                        depreciacao: { atual: 0, anterior: 0 },
                        resultado_fin: { atual: 0, anterior: 0 },
                        outras_desp_rec: { atual: 0, anterior: 0 },
                        outras_receitas_nao_op: { atual: 0, anterior: 0 }
                    };

                    for (const item of data) {
                        const h = item.hierarquia + '.';
                        if (h.startsWith('1.1.') || h.startsWith('1.2.') || h.startsWith('1.3.')) {
                            totals.receita_bruta.atual += item.valor_atual;
                            totals.receita_bruta.anterior += item.valor_anterior;
                        }
                        if (h.startsWith('1.1.') || h.startsWith('1.2.') || h.startsWith('1.3.') || h.startsWith('1.4.')) {
                            totals.receita_liquida.atual += item.valor_atual;
                            totals.receita_liquida.anterior += item.valor_anterior;
                        }
                        if (h.startsWith('3.')) totals.csp.atual += item.valor_atual, totals.csp.anterior += item.valor_anterior;
                        if (h.startsWith('5.')) totals.despesas_op.atual += item.valor_atual, totals.despesas_op.anterior += item.valor_anterior;
                        if (h.startsWith('5.1.')) totals.despesas_admin.atual += item.valor_atual, totals.despesas_admin.anterior += item.valor_anterior;
                        if (h.startsWith('5.2.')) totals.despesas_comerc.atual += item.valor_atual, totals.despesas_comerc.anterior += item.valor_anterior;
                        if (h.startsWith('5.3.')) totals.pecld.atual += item.valor_atual, totals.pecld.anterior += item.valor_anterior;
                        if (h.startsWith('5.4.')) totals.depreciacao.atual += item.valor_atual, totals.depreciacao.anterior += item.valor_anterior;
                        if (h.startsWith('5.5.')) totals.resultado_fin.atual += item.valor_atual, totals.resultado_fin.anterior += item.valor_anterior;
                        if (h.startsWith('5.6.')) totals.outras_desp_rec.atual += item.valor_atual, totals.outras_desp_rec.anterior += item.valor_anterior;
                        if (h.startsWith('7.')) totals.outras_receitas_nao_op.atual += item.valor_atual, totals.outras_receitas_nao_op.anterior += item.valor_anterior;
                    }
                    
                    const resultado_bruto = {
                        atual: totals.receita_liquida.atual + totals.csp.atual,
                        anterior: totals.receita_liquida.anterior + totals.csp.anterior
                    };
                    const resultado_op_liquido = {
                        atual: resultado_bruto.atual + totals.despesas_op.atual,
                        anterior: resultado_bruto.anterior + totals.despesas_op.anterior
                    };
                    const resultado_antes_impostos = {
                        atual: resultado_op_liquido.atual + totals.outras_receitas_nao_op.atual,
                        anterior: resultado_op_liquido.anterior + totals.outras_receitas_nao_op.anterior
                    };
                    
                    let html = '';
                    const renderGroup = (groupPrefix) => {
                        let groupHtml = '';
                        const items = data.filter(d => (d.hierarquia + '.').startsWith(groupPrefix + '.'));
                        items.forEach(item => {
                            const level = item.hierarquia.split('.').length;
                            groupHtml += createRow(level, `${item.descricao}`, item.valor_atual, item.valor_anterior);
                        });
                        return groupHtml;
                    };
                    
                    // --- INÍCIO DA LÓGICA DE RENDERIZAÇÃO CORRIGIDA ---

                    // 1. RECEITA BRUTA
                    html += createRow(1, '1. (+) RECEITA BRUTA', totals.receita_bruta.atual, totals.receita_bruta.anterior, true);
                    html += renderGroup('1');
                    html += createRow(1, '2. (=) RECEITA OPERACIONAL LÍQUIDA', totals.receita_liquida.atual, totals.receita_liquida.anterior, true, true);
                    html += createSpacerRow();

                    // 2. CUSTO E RESULTADO BRUTO
                    html += createRow(1, '3. (-) CUSTO DO SERVIÇO PRESTADO (CSP)', totals.csp.atual, totals.csp.anterior, true, false, true);
                    html += renderGroup('3');
                    html += createRow(1, '4. (=) RESULTADO OPERACIONAL BRUTO', resultado_bruto.atual, resultado_bruto.anterior, true, true);
                    html += createSpacerRow();
                    
                    // 3. DESPESAS OPERACIONAIS
                    html += createRow(1, '5. DESPESAS E RECEITAS OPERACIONAIS', totals.despesas_op.atual, totals.despesas_op.anterior, true);
                    html += createRow(2, '5.1 DESPESAS ADMINISTRATIVAS', totals.despesas_admin.atual, totals.despesas_admin.anterior, true);
                    html += renderGroup('5.1');
                    html += createRow(2, '5.2 DESPESAS COMERCIAIS', totals.despesas_comerc.atual, totals.despesas_comerc.anterior, true);
                    html += renderGroup('5.2');
                    html += createRow(2, '5.3 PECLD', totals.pecld.atual, totals.pecld.anterior, true);
                    html += renderGroup('5.3');
                    html += createRow(2, '5.4 DESPESAS C/ DEPRECIAÇÃO E AMORTIZAÇÃO', totals.depreciacao.atual, totals.depreciacao.anterior, true);
                    html += renderGroup('5.4');
                    html += createRow(2, '5.5 RESULTADO FINANCEIRO', totals.resultado_fin.atual, totals.resultado_fin.anterior, true);
                    html += renderGroup('5.5');
                    html += createRow(2, '5.6 OUTRAS DESPESAS E RECEITAS NÃO DEDUTÍVEIS', totals.outras_desp_rec.atual, totals.outras_desp_rec.anterior, true);
                    html += renderGroup('5.6');
                    html += createRow(1, '6. (=) RESULTADO OPERACIONAL LÍQUIDO', resultado_op_liquido.atual, resultado_op_liquido.anterior, true, true);
                    html += createSpacerRow();

                    // 4. RESULTADO ANTES DOS IMPOSTOS
                    html += createRow(1, '7. OUTRAS RECEITAS NÃO OPERACIONAIS', totals.outras_receitas_nao_op.atual, totals.outras_receitas_nao_op.anterior, true);
                    html += renderGroup('7');
                    html += createRow(1, '8. (=) RESULTADO ANTES DOS IMPOSTOS APURADOS', resultado_antes_impostos.atual, resultado_antes_impostos.anterior, true, true);
                    
                    // --- FIM DA LÓGICA DE RENDERIZAÇÃO ---

                    reportBody.innerHTML = html;

                } catch (error) {
                    console.error("Falha ao gerar o relatório DRE:", error);
                    loadingState.innerHTML = `<div class="p-8 text-center text-red-700 bg-red-50">Ocorreu um erro ao carregar os dados. <br><small>${error.message}</small></div>`;
                } finally {
                    loadingState.style.display = 'none';
                }
            }
            
            const initializeComponent = async () => {
                await renderReport();
            };
    
            document.body.addEventListener(MITRA_UPDATE_EVENT_NAME, renderReport);

            const waitForMitraAndInit = () => {
                const maxWaitTime = 5000;
                const intervalTime = 100;
                const startTime = Date.now();

                const checkInterval = setInterval(() => {
                    if (window.componentData && window.componentData.query) {
                        clearInterval(checkInterval);
                        initializeComponent();
                    } else if (Date.now() - startTime > maxWaitTime) {
                        clearInterval(checkInterval);
                        console.error("Erro: componentData.query não foi carregado a tempo.");
                        document.body.innerHTML = `<div class="p-8 text-center text-red-700 bg-red-50 h-full flex items-center justify-center">Erro Crítico: A configuração da query do componente não foi carregada da plataforma.</div>`;
                    }
                }, intervalTime);
            };

            waitForMitraAndInit();
        });
    </script>
</body>
</html>
