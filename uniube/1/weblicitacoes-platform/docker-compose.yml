services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-weblicitacoes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weblicitacoes_secret}
      POSTGRES_DB: ${POSTGRES_DB:-weblicitacoes}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weblicitacoes}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://weblicitacoes:weblicitacoes_secret@db:5432/weblicitacoes}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  worker:
    build:
      context: ./worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://weblicitacoes:weblicitacoes_secret@db:5432/weblicitacoes}
      SCRAPER_HEADLESS: ${SCRAPER_HEADLESS:-false}
      SCRAPER_DELAY_SEC: ${SCRAPER_DELAY_SEC:-2.0}
      SCRAPER_POLL_INTERVAL_SEC: ${SCRAPER_POLL_INTERVAL_SEC:-10}
      SCRAPER_FORM_TIMEOUT_MS: ${SCRAPER_FORM_TIMEOUT_MS:-60000}
      SCRAPER_MAX_RETRIES: ${SCRAPER_MAX_RETRIES:-3}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    # Playwright precisa de display quando headless=false; descomente para coleta visual:
    # volumes:
    #   - /tmp/.X11-unix:/tmp/.X11-unix
    # environment:
    #   DISPLAY: ${DISPLAY:-:0}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
