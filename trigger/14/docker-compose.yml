services:
  crud:
    build: .
    ports:
      - "8091:8000"
    volumes:
      - ./data:/data
      - ./app:/app/app
    environment:
      - DATA_DIR=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/config')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
