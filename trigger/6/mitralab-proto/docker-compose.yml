services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mitralab
      POSTGRES_PASSWORD: mitralab
      POSTGRES_DB: mitralab
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mitralab -d mitralab"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - mitralab_pg:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mitralab
      DB_USER: mitralab
      DB_PASSWORD: mitralab
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      ALLOW_INLINE_DB_PASSWORD: ${ALLOW_INLINE_DB_PASSWORD:-false}
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mitralab_pg:
