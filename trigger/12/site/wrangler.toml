# Cloudflare Workers — static assets (trigger-site)
# Root directory no dashboard: trigger/12/site
# Deploy command: npx wrangler deploy
# NÃO coloque package.json aqui — o Cloudflare instala node_modules
# dentro desta pasta e o wrangler tentaria publicá-los como assets.

name = "trigger-site"
compatibility_date = "2025-06-08"

[assets]
directory = "."
not_found_handling = "404-page"
html_handling = "auto-trailing-slash"
