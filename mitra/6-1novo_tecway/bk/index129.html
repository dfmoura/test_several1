<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicadores – Balanço Patrimonial</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --primary: 222.2 47.4% 11.2%;
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96.1%;
            --secondary-foreground: 222.2 84% 4.9%;
            --muted: 210 40% 96.1%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --border: 214.3 31.8% 91.4%;
            --ring: 222.2 84% 4.9%;
            --radius: 0.5rem;
        }

        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .indicador-formula {
            font-size: 0.875rem;
            color: hsl(var(--muted-foreground));
        }
    </style>
</head>

<body class="p-4 sm:p-6 lg:p-8">
    <div id="report-container" class="w-full max-w-5xl mx-auto">
        <div id="loading-state" class="flex items-center justify-center py-16">
            <p class="text-lg text-muted-foreground">Carregando dados do balanço...</p>
        </div>
        <div id="report-content" class="hidden space-y-12">
            <header class="border-b border-border pb-4">
                <h1 class="text-2xl font-bold">Indicadores financeiros</h1>
                
            </header>

            <!-- Seção LIQUIDEZ -->
            <section>
                <h2 class="text-lg font-bold border-b border-border pb-2 mb-4">LIQUIDEZ</h2>
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse text-sm">
                        <thead>
                            <tr class="border-b-2 border-foreground">
                                <th class="text-left py-2 px-3 font-semibold">Cód.</th>
                                <th class="text-left py-2 px-3 font-semibold">Indicador</th>
                                <th class="text-left py-2 px-3 font-semibold">Fórmula</th>
                                <th class="text-right py-2 px-3 font-semibold w-28" data-dynamic-text="current-year">–</th>
                                <th class="text-right py-2 px-3 font-semibold w-28" data-dynamic-text="previous-year">–</th>
                            </tr>
                        </thead>
                        <tbody id="indicadores-liquidez-tbody">
                            <tr><td colspan="5" class="p-4 text-center text-muted-foreground">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Seção ESTRUTURA DE CAPITAL -->
            <section>
                <h2 class="text-lg font-bold border-b border-border pb-2 mb-4">ESTRUTURA DE CAPITAL</h2>
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse text-sm">
                        <thead>
                            <tr class="border-b-2 border-foreground">
                                <th class="text-left py-2 px-3 font-semibold">Cód.</th>
                                <th class="text-left py-2 px-3 font-semibold">Indicador</th>
                                <th class="text-left py-2 px-3 font-semibold">Fórmula</th>
                                <th class="text-right py-2 px-3 font-semibold w-28" data-dynamic-text="current-year-2">–</th>
                                <th class="text-right py-2 px-3 font-semibold w-28" data-dynamic-text="previous-year-2">–</th>
                            </tr>
                        </thead>
                        <tbody id="indicadores-estrutura-tbody">
                            <tr><td colspan="5" class="p-4 text-center text-muted-foreground">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script>
        const MITRA_UPDATE_EVENT_NAME = 'mitra-update-indicadores-bp';

        function updateMitra() {
            document.body.dispatchEvent(new CustomEvent(MITRA_UPDATE_EVENT_NAME));
        }

        /**
         * Extrai o ano a partir do mês de referência (ex.: "12/2024" -> "2024").
         * Usado para títulos dinâmicos "ano atual" e "ano anterior".
         */
        function parseYearFromMes(mesReferencia) {
            const s = (mesReferencia != null && mesReferencia !== '') ? String(mesReferencia).trim() : '';
            if (!s) return String(new Date().getFullYear());
            if (s.includes('/')) {
                const partes = s.split('/');
                const ano = (partes[1] || partes[0] || '').trim();
                if (ano.length === 4 && /^\d{4}$/.test(ano)) return ano;
            }
            if (/^\d{4}$/.test(s)) return s;
            return String(new Date().getFullYear());
        }

        /**
         * Retorna a soma dos valores (valorAtual, valorAnterior) de todos os itens do BP
         * cuja hierarquia é exatamente igual ao código ou começa com código + '.'.
         * Ex.: código "1.1" soma 1.1, 1.1.1, 1.1.12, etc.
         * Quando o código termina em '.', também considera hierarquia sem o ponto (ex.: "2." considera "2").
         */
        function getValorByHierarquia(bpData, code) {
            if (!bpData || !Array.isArray(bpData)) return { valorAtual: 0, valorAnterior: 0 };
            const normalized = (code || '').toString().trim();
            const match = (h) => {
                if (!h) return false;
                const s = String(h).trim();
                if (s === normalized) return true;
                if (s.startsWith(normalized + '.')) return true;
                if (normalized.endsWith('.') && s === normalized.slice(0, -1)) return true;
                return false;
            };
            return bpData.filter(d => match(d.hierarquia)).reduce(
                (acc, item) => {
                    acc.valorAtual += parseFloat(item.valorAtual) || 0;
                    acc.valorAnterior += parseFloat(item.valorAnterior) || 0;
                    return acc;
                },
                { valorAtual: 0, valorAnterior: 0 }
            );
        }

        /**
         * Monta o objeto de base para os indicadores a partir do BP (mesma estrutura queryDadosBP/index126).
         * Chaves: 1., 1.1, 1.1.1, 1.1.12, 1.2, 1.2.1, 2., 2.1, 2.2, 2.1.4, 2.2.1, 3.
         * 1., 2. e 3. (ativo total, passivo total, PL) são obtidos por soma dos filhos quando a agregação direta for zero.
         */
        function computeBPBase(bpData) {
            if (!bpData || bpData.length === 0) return null;
            const v11 = getValorByHierarquia(bpData, '1.1');
            const v12 = getValorByHierarquia(bpData, '1.2');
            const v21 = getValorByHierarquia(bpData, '2.1');
            const v22 = getValorByHierarquia(bpData, '2.2');
            const v31 = getValorByHierarquia(bpData, '3.1');
            const v32 = getValorByHierarquia(bpData, '3.2');
            const v33 = getValorByHierarquia(bpData, '3.3');
            const v1ponto = getValorByHierarquia(bpData, '1.');
            const v2ponto = getValorByHierarquia(bpData, '2.');
            const v3ponto = getValorByHierarquia(bpData, '3.');
            const total1 = (v1ponto.valorAtual !== 0 || v1ponto.valorAnterior !== 0)
                ? v1ponto
                : { valorAtual: v11.valorAtual + v12.valorAtual, valorAnterior: v11.valorAnterior + v12.valorAnterior };
            const total2 = (v2ponto.valorAtual !== 0 || v2ponto.valorAnterior !== 0)
                ? v2ponto
                : { valorAtual: v21.valorAtual + v22.valorAtual, valorAnterior: v21.valorAnterior + v22.valorAnterior };
            const total3 = (v3ponto.valorAtual !== 0 || v3ponto.valorAnterior !== 0)
                ? v3ponto
                : { valorAtual: v31.valorAtual + v32.valorAtual + v33.valorAtual, valorAnterior: v31.valorAnterior + v32.valorAnterior + v33.valorAnterior };
            return {
                '1.': total1,
                '1.1': v11,
                '1.1.1': getValorByHierarquia(bpData, '1.1.1'),
                '1.1.12': getValorByHierarquia(bpData, '1.1.12'),
                '1.2': v12,
                '1.2.1': getValorByHierarquia(bpData, '1.2.1'),
                '2.': total2,
                '2.1': v21,
                '2.2': v22,
                '2.1.4': getValorByHierarquia(bpData, '2.1.4'),
                '2.2.1': getValorByHierarquia(bpData, '2.2.1'),
                '3.': total3
            };
        }

        function safeDiv(num, den) {
            if (den == null || den === 0 || isNaN(den)) return null;
            const n = parseFloat(num);
            return (num != null && !isNaN(n)) ? n / den : null;
        }

        function formatCurrency(value) {
            const num = parseFloat(value);
            if (isNaN(num)) return '–';
            return new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
        }

        function formatRatio(value) {
            const num = parseFloat(value);
            if (isNaN(num)) return '–';
            return new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
        }

        function formatPercent(value) {
            const num = parseFloat(value);
            if (isNaN(num)) return '–';
            return new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num) + ' %';
        }

        /**
         * Calcula os indicadores de LIQUIDEZ e ESTRUTURA DE CAPITAL conforme as fórmulas em hierarquia.
         */
        function computeIndicadores(b) {
            const r = (num, den) => safeDiv(num, den);
            const pct = (num, den) => {
                const q = safeDiv(num, den);
                return q != null ? q * 100 : null;
            };

            // LIQUIDEZ
            const LC_atual = r(b['1.1'].valorAtual, b['2.1'].valorAtual);
            const LC_anterior = r(b['1.1'].valorAnterior, b['2.1'].valorAnterior);

            const numLS_atual = b['1.1'].valorAtual - b['1.1.12'].valorAtual;
            const numLS_anterior = b['1.1'].valorAnterior - b['1.1.12'].valorAnterior;
            const LS_atual = r(numLS_atual, b['2.1'].valorAtual);
            const LS_anterior = r(numLS_anterior, b['2.1'].valorAnterior);

            const numLG_atual = b['1.1'].valorAtual + b['1.2.1'].valorAtual;
            const numLG_anterior = b['1.1'].valorAnterior + b['1.2.1'].valorAnterior;
            const LG_atual = r(numLG_atual, b['2.'].valorAtual);
            const LG_anterior = r(numLG_anterior, b['2.'].valorAnterior);

            const LI_atual = r(b['1.1.1'].valorAtual, b['2.1'].valorAtual);
            const LI_anterior = r(b['1.1.1'].valorAnterior, b['2.1'].valorAnterior);

            // ESTRUTURA DE CAPITAL
            const EG_atual = pct(b['2.'].valorAtual, b['1.'].valorAtual);
            const EG_anterior = pct(b['2.'].valorAnterior, b['1.'].valorAnterior);

            const PCT_atual = pct(b['2.'].valorAtual, b['3.'].valorAtual);
            const PCT_anterior = pct(b['2.'].valorAnterior, b['3.'].valorAnterior);

            const CE_atual = pct(b['2.1'].valorAtual, b['2.'].valorAtual);
            const CE_anterior = pct(b['2.1'].valorAnterior, b['2.'].valorAnterior);

            const numIPL_atual = b['1.2'].valorAtual - b['1.2.1'].valorAtual;
            const numIPL_anterior = b['1.2'].valorAnterior - b['1.2.1'].valorAnterior;
            const IPL_atual = pct(numIPL_atual, b['3.'].valorAtual);
            const IPL_anterior = pct(numIPL_anterior, b['3.'].valorAnterior);

            const numIRNC_atual = b['2.1'].valorAtual - b['1.2.1'].valorAtual;
            const numIRNC_anterior = b['2.1'].valorAnterior - b['1.2.1'].valorAnterior;
            const denIRNC_atual = b['2.2'].valorAtual + b['3.'].valorAtual;
            const denIRNC_anterior = b['2.2'].valorAnterior + b['3.'].valorAnterior;
            const IRNC_atual = pct(numIRNC_atual, denIRNC_atual);
            const IRNC_anterior = pct(numIRNC_anterior, denIRNC_anterior);

            const DL_atual = b['2.'].valorAtual - b['1.1.1'].valorAtual;
            const DL_anterior = b['2.'].valorAnterior - b['1.1.1'].valorAnterior;

            const DB_atual = b['2.'].valorAtual;
            const DB_anterior = b['2.'].valorAnterior;

            const numEO_atual = b['2.1.4'].valorAtual + b['2.2.1'].valorAtual;
            const numEO_anterior = b['2.1.4'].valorAnterior + b['2.2.1'].valorAnterior;
            const EO_atual = r(numEO_atual, b['1.'].valorAtual);
            const EO_anterior = r(numEO_anterior, b['1.'].valorAnterior);

            const SG_atual = r(b['1.'].valorAtual, b['2.'].valorAtual);
            const SG_anterior = r(b['1.'].valorAnterior, b['2.'].valorAnterior);

            return {
                liquidez: [
                    { cod: 'LC', nome: 'Liquidez corrente', formula: 'AC/PC', atual: LC_atual, anterior: LC_anterior, format: 'ratio' },
                    { cod: 'LS', nome: 'Liquidez seca', formula: '(AC - ESTOQUE) / PC', atual: LS_atual, anterior: LS_anterior, format: 'ratio' },
                    { cod: 'LG', nome: 'Liquidez geral', formula: '(AC + RLP) / (PC + PNC)', atual: LG_atual, anterior: LG_anterior, format: 'ratio' },
                    { cod: 'LI', nome: 'Liquidez imediata', formula: 'DISPONIBILIDADE / PC', atual: LI_atual, anterior: LI_anterior, format: 'ratio' }
                ],
                estrutura: [
                    { cod: 'EG', nome: 'Endividamento geral', formula: '((PC + PNC) / (AC + ANC)) * 100', atual: EG_atual, anterior: EG_anterior, format: 'percent' },
                    { cod: 'PCT', nome: 'Participação de capital de terceiros', formula: '((PC + PNC) / PL) * 100', atual: PCT_atual, anterior: PCT_anterior, format: 'percent' },
                    { cod: 'CE', nome: 'Composição do endividamento', formula: '(PC / (PC + PNC)) * 100', atual: CE_atual, anterior: CE_anterior, format: 'percent' },
                    { cod: 'IPL', nome: 'Imobilização do patrimônio líquido', formula: '((ANC - RLP) / PL) * 100', atual: IPL_atual, anterior: IPL_anterior, format: 'percent' },
                    { cod: 'IRNC', nome: 'Imobilização do recurso não corrente', formula: '((ANC - RLP) / (PNC + PL)) * 100', atual: IRNC_atual, anterior: IRNC_anterior, format: 'percent' },
                    { cod: 'DL', nome: 'Dívida líquida', formula: '(PC + PNC) - DISPONIBILIDADES', atual: DL_atual, anterior: DL_anterior, format: 'currency' },
                    { cod: 'DB', nome: 'Dívida bruta', formula: 'PC + PNC', atual: DB_atual, anterior: DB_anterior, format: 'currency' },
                    { cod: 'EO', nome: 'Endividamento oneroso', formula: '(EMPRÉSTIMO + FINANCIAMENTO) / ATIVO TOTAL', atual: EO_atual, anterior: EO_anterior, format: 'ratio' },
                    { cod: 'SG', nome: 'Solvência geral', formula: 'ATIVO / (PC + PNC)', atual: SG_atual, anterior: SG_anterior, format: 'ratio' }
                ]
            };
        }

        function formatValor(value, format) {
            if (value == null || isNaN(value)) return '–';
            switch (format) {
                case 'percent': return formatPercent(value);
                case 'currency': return formatCurrency(value);
                default: return formatRatio(value);
            }
        }

        function renderIndicadores(bpData, currentYear, previousYear) {
            const tbodyLiq = document.getElementById('indicadores-liquidez-tbody');
            const tbodyEst = document.getElementById('indicadores-estrutura-tbody');
            if (!tbodyLiq || !tbodyEst) return;

            const base = computeBPBase(bpData);
            if (!base) {
                tbodyLiq.innerHTML = '<tr><td colspan="5" class="p-6 text-center text-muted-foreground">Nenhum dado do balanço disponível para calcular indicadores.</td></tr>';
                tbodyEst.innerHTML = '<tr><td colspan="5" class="p-6 text-center text-muted-foreground">Nenhum dado do balanço disponível para calcular indicadores.</td></tr>';
                return;
            }

            const ind = computeIndicadores(base);

            tbodyLiq.innerHTML = ind.liquidez.map(i => `
                <tr class="border-b border-border">
                    <td class="py-2 px-3 font-mono text-muted-foreground">${i.cod}</td>
                    <td class="py-2 px-3 font-medium">${i.nome}</td>
                    <td class="py-2 px-3 indicador-formula">${i.formula}</td>
                    <td class="py-2 px-3 text-right tabular-nums">${formatValor(i.atual, i.format)}</td>
                    <td class="py-2 px-3 text-right tabular-nums">${formatValor(i.anterior, i.format)}</td>
                </tr>
            `).join('');

            tbodyEst.innerHTML = ind.estrutura.map(i => `
                <tr class="border-b border-border">
                    <td class="py-2 px-3 font-mono text-muted-foreground">${i.cod}</td>
                    <td class="py-2 px-3 font-medium">${i.nome}</td>
                    <td class="py-2 px-3 indicador-formula">${i.formula}</td>
                    <td class="py-2 px-3 text-right tabular-nums">${formatValor(i.atual, i.format)}</td>
                    <td class="py-2 px-3 text-right tabular-nums">${formatValor(i.anterior, i.format)}</td>
                </tr>
            `).join('');

            document.querySelectorAll('[data-dynamic-text="current-year"]').forEach(el => { el.textContent = currentYear; });
            document.querySelectorAll('[data-dynamic-text="previous-year"]').forEach(el => { el.textContent = previousYear; });
            document.querySelectorAll('[data-dynamic-text="current-year-2"]').forEach(el => { el.textContent = currentYear; });
            document.querySelectorAll('[data-dynamic-text="previous-year-2"]').forEach(el => { el.textContent = previousYear; });
        }

        function processBPResult(result) {
            if (!result || !result.data || result.data.length === 0) return null;
            const headers = (result.headers || []).map(h => (h && h.name ? h.name.toUpperCase() : ''));
            const colMap = {
                hierarquia: headers.indexOf('HIERARQUIA'),
                descricao: headers.indexOf('DESCRICAO'),
                valorAtual: headers.indexOf('VALOR_ATUAL'),
                valorAnterior: headers.indexOf('VALOR_ANTERIOR'),
                sinal: headers.indexOf('SINAL')
            };
            if (colMap.hierarquia === -1 || colMap.valorAtual === -1 || colMap.valorAnterior === -1) return null;
            return result.data.map(row => {
                const sinal = colMap.sinal !== -1 ? (parseFloat(row[colMap.sinal]) || 1) : 1;
                const vA = parseFloat(row[colMap.valorAtual]) || 0;
                const vAnt = parseFloat(row[colMap.valorAnterior]) || 0;
                return {
                    hierarquia: (row[colMap.hierarquia] || '').toString().trim(),
                    descricao: row[colMap.descricao] || '',
                    valorAtual: vA * sinal,
                    valorAnterior: vAnt * sinal
                };
            });
        }

        async function fetchAndRenderData() {
            const container = document.getElementById('report-container');
            const loadingEl = document.getElementById('loading-state');
            const contentEl = document.getElementById('report-content');

            contentEl.classList.add('hidden');
            loadingEl.classList.remove('hidden');
            loadingEl.textContent = 'Carregando dados do balanço...';

            const queryBP = window.componentData && (window.componentData.queryDadosBP || window.componentData.queryDados || window.componentData.queryBP1);
            if (!queryBP) {
                loadingEl.textContent = 'Erro: query do balanço não configurada (queryDadosBP, queryDados ou queryBP1).';
                return;
            }

            try {
                const bpResult = await queryMitra({ query: queryBP });
                const bpData = processBPResult(bpResult);

                let dateString = '';
                if (bpResult && bpResult.headers && bpResult.data && bpResult.data.length > 0) {
                    const headers = (bpResult.headers || []).map(h => (h && h.name ? String(h.name).toUpperCase() : ''));
                    const mesIdx = headers.indexOf('MES');
                    if (mesIdx !== -1 && bpResult.data[0][mesIdx] != null && bpResult.data[0][mesIdx] !== '') {
                        dateString = String(bpResult.data[0][mesIdx]).trim();
                    }
                }
                if (!dateString && window.componentData && window.componentData.varMes) {
                    const mesResult = await queryMitra({ query: 'SELECT ' + window.componentData.varMes });
                    if (mesResult && mesResult.data && mesResult.data[0] && mesResult.data[0][0])
                        dateString = String(mesResult.data[0][0]).trim();
                }
                const currentYear = parseYearFromMes(dateString);
                const previousYear = parseInt(currentYear, 10) - 1;

                if (bpData && bpData.length > 0) {
                    renderIndicadores(bpData, currentYear, previousYear);
                    loadingEl.classList.add('hidden');
                    contentEl.classList.remove('hidden');
                } else {
                    loadingEl.textContent = 'Nenhum dado encontrado para o balanço.';
                    contentEl.classList.add('hidden');
                }
            } catch (err) {
                console.error('Falha ao carregar indicadores:', err);
                loadingEl.textContent = 'Erro ao carregar dados do balanço.';
                contentEl.classList.add('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.body.addEventListener(MITRA_UPDATE_EVENT_NAME, fetchAndRenderData);
            const maxWait = 5000;
            const interval = 100;
            const start = Date.now();
            const ti = setInterval(() => {
                const queryBP = window.componentData && (window.componentData.queryDadosBP || window.componentData.queryDados || window.componentData.queryBP1);
                if (window.componentData && queryBP) {
                    clearInterval(ti);
                    fetchAndRenderData();
                } else if (Date.now() - start > maxWait) {
                    clearInterval(ti);
                    document.getElementById('loading-state').textContent = 'Erro: configurações do componente (componentData) não carregadas a tempo.';
                }
            }, interval);
        });
    </script>
</body>

</html>
