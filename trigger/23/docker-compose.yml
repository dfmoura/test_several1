services:
  app:
    build: .
    ports:
      - "8096:8096"
    volumes:
      - ./data:/app/data
    environment:
      - APP_PORT=8096
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8096/api/health', timeout=5)",
        ]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 20s
