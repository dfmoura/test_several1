
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demonstração das Mutações do Patrimônio Líquido (DMPL)</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --primary: 222.2 47.4% 11.2%;
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96.1%;
            --secondary-foreground: 222.2 84% 4.9%;
            --muted: 210 40% 96.1%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --accent: 210 40% 96.1%;
            --accent-foreground: 222.2 84% 4.9%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 210 40% 98%;
            --border: 214.3 31.8% 91.4%;
            --input: 214.3 31.8% 91.4%;
            --ring: 222.2 84% 4.9%;
            --radius: 0.5rem;
        }
        .dark {
            --background: 222.2 84% 4.9%;
            --foreground: 210 40% 98%;
            --primary: 210 40% 98%;
            --primary-foreground: 222.2 47.4% 11.2%;
            --secondary: 217.2 32.6% 17.5%;
            --secondary-foreground: 210 40% 98%;
            --muted: 217.2 32.6% 17.5%;
            --muted-foreground: 215 20.2% 65.1%;
            --accent: 217.2 32.6% 17.5%;
            --accent-foreground: 210 40% 98%;
            --destructive: 0 62.8% 30.6%;
            --destructive-foreground: 210 40% 98%;
            --border: 217.2 32.6% 17.5%;
            --input: 217.2 32.6% 17.5%;
            --ring: 212.7 26.8% 83.9%;
        }
        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
        }
    </style>
</head>
<body class="h-full w-full">

    <div id="dmpl-container" class="h-full w-full p-4 sm:p-6 overflow-auto">
        <!-- Content will be injected here -->
    </div>

    <script>
        const MITRA_UPDATE_EVENT_NAME = 'mitra-update-dmpl-report';

        function updateMitra() {
            console.log("Sinal de update para [DMPL Report] recebido. Disparando evento.");
            document.body.dispatchEvent(new CustomEvent(MITRA_UPDATE_EVENT_NAME));
        }

        function formatNumber(value) {
            const num = parseFloat(value);
            if (value === null || value === undefined || isNaN(num)) {
                return '-';
            }
            if (Math.abs(num) < 0.01) { // Treat values very close to zero as zero
                return '-';
            }
            const formatted = Math.abs(num).toLocaleString('pt-BR', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            });
            return num < 0 ? `(${formatted})` : formatted;
        }

        function renderLoading() {
            const container = document.getElementById('dmpl-container');
            container.innerHTML = `
                <div class="flex items-center justify-center h-full text-muted-foreground">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Carregando relatório...</span>
                </div>`;
        }
        
        function renderError(message) {
            const container = document.getElementById('dmpl-container');
            container.innerHTML = `<div class="p-8 text-center text-destructive bg-destructive/10 h-full flex items-center justify-center">${message}</div>`;
        }

        function renderReport(data) {
            const container = document.getElementById('dmpl-container');
            
            const tableHTML = `
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[800px] border-collapse text-sm text-foreground">
                        <thead>
                            <tr class="text-center font-bold">
                                <th class="w-[34%] text-left font-normal pb-2"></th>
                                <th class="w-[16.5%] pb-2 border-b-2 border-foreground">Capital Social</th>
                                <th class="w-[16.5%] pb-2 border-b-2 border-foreground">Ajuste da Avaliação</th>
                                <th class="w-[16.5%] pb-2 border-b-2 border-foreground">Lucros ou Prejuízos<br>Acumulados</th>
                                <th class="w-[16.5%] pb-2 border-b-2 border-foreground">Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Ano Base -->
                            <tr><td colspan="5" class="pt-4"></td></tr>
                            <tr class="font-bold">
                                <td>Saldos em 31 de dezembro de ${data.years.base}</td>
                                <td class="text-center">${formatNumber(data.saldoBase.capital)}</td>
                                <td class="text-center">${formatNumber(data.saldoBase.ajuste)}</td>
                                <td class="text-center">${formatNumber(data.saldoBase.acumulados)}</td>
                                <td class="text-center">${formatNumber(data.saldoBase.total)}</td>
                            </tr>
                            <tr><td colspan="5" class="pt-4"></td></tr>
                            
                            <!-- Movimentações Ano Anterior -->
                            <tr>
                                <td>Lucro distribuídos</td>
                                <td></td>
                                <td></td>
                                <td class="text-center">${formatNumber(data.movAnt.distribuidos)}</td>
                                <td class="text-center">${formatNumber(data.movAnt.distribuidos)}</td>
                            </tr>
                            <tr>
                                <td>Lucro do exercício</td>
                                <td></td>
                                <td></td>
                                <td class="text-center">${formatNumber(data.movAnt.lucro)}</td>
                                <td class="text-center">${formatNumber(data.movAnt.lucro)}</td>
                            </tr>
                            <tr>
                                <td>Ajuste de Avaliação</td>
                                <td></td>
                                <td class="text-center">${formatNumber(data.movAnt.ajuste)}</td>
                                <td></td>
                                <td class="text-center">${formatNumber(data.movAnt.ajuste)}</td>
                            </tr>
                            <tr><td colspan="5" class="pt-2"></td></tr>

                            <!-- Saldo Ano Anterior -->
                            <tr class="font-bold">
                                <td class="border-t-2 border-foreground pt-2">Saldos em 31 de dezembro de ${data.years.anterior}</td>
                                <td class="border-t-2 border-foreground pt-2 text-center">${formatNumber(data.saldoAnt.capital)}</td>
                                <td class="border-t-2 border-foreground pt-2 text-center">${formatNumber(data.saldoAnt.ajuste)}</td>
                                <td class="border-t-2 border-foreground pt-2 text-center">${formatNumber(data.saldoAnt.acumulados)}</td>
                                <td class="border-t-2 border-foreground pt-2 text-center">${formatNumber(data.saldoAnt.total)}</td>
                            </tr>
                            <tr><td colspan="5" class="pt-4"></td></tr>
                            
                            <!-- Movimentações Ano Atual -->
                            <tr>
                                <td>Lucro distribuídos</td>
                                <td></td>
                                <td></td>
                                <td class="text-center">${formatNumber(data.movAtual.distribuidos)}</td>
                                <td class="text-center">${formatNumber(data.movAtual.distribuidos)}</td>
                            </tr>
                             <tr>
                                <td>Lucro do exercício</td>
                                <td></td>
                                <td></td>
                                <td class="text-center">${formatNumber(data.movAtual.lucro)}</td>
                                <td class="text-center">${formatNumber(data.movAtual.lucro)}</td>
                            </tr>
                             <tr>
                                <td>Ajuste de Avaliação</td>
                                <td></td>
                                <td class="text-center">${formatNumber(data.movAtual.ajuste)}</td>
                                <td></td>
                                <td class="text-center">${formatNumber(data.movAtual.ajuste)}</td>
                            </tr>
                            <tr><td colspan="5" class="pt-2"></td></tr>

                            <!-- Saldo Ano Atual (Final) -->
                            <tr class="font-bold">
                                <td class="border-t-2 border-double border-foreground pt-2">Saldo em 31 de Dezembro de ${data.years.atual}</td>
                                <td class="border-t-2 border-double border-foreground pt-2 text-center">${formatNumber(data.saldoAtual.capital)}</td>
                                <td class="border-t-2 border-double border-foreground pt-2 text-center">${formatNumber(data.saldoAtual.ajuste)}</td>
                                <td class="border-t-2 border-double border-foreground pt-2 text-center">${formatNumber(data.saldoAtual.acumulados)}</td>
                                <td class="border-t-2 border-double border-foreground pt-2 text-center">${formatNumber(data.saldoAtual.total)}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            `;
            container.innerHTML = tableHTML;
        }

        async function fetchDataAndRender() {
            renderLoading();
            
            try {
                // 1. Obter a data de referência para calcular os anos
                const dateRefQuery = `SELECT ${componentData.varMes}`;
                const dateResult = await queryMitra({ query: dateRefQuery });
                if (!dateResult || !dateResult.data || !dateResult.data[0] || !dateResult.data[0][0]) {
                    throw new Error(`A variável de data de referência (${componentData.varMes}) não retornou um valor.`);
                }
                const referenceDateStr = dateResult.data[0][0];
                const datePart = referenceDateStr.split(' ')[0]; // Extrai 'YYYY-MM-DD'
                const refDate = new Date(datePart + 'T12:00:00'); // Usa o meio-dia para evitar problemas de fuso horário
                if (isNaN(refDate.getTime())) {
                    throw new Error(`Data de referência inválida: \"${referenceDateStr}\"`);
                }
                const currentYear = refDate.getFullYear();
                const years = {
                    atual: currentYear,
                    anterior: currentYear - 1,
                    base: currentYear - 2
                };

                // 2. Buscar os dados principais do DMPL
                const result = await queryMitra({ query: componentData.queryDados });
                
                if (!result || !result.data) {
                    throw new Error("A consulta de dados não retornou resultados.");
                }

                // 3. Processar e Mapear os dados
                const headers = result.headers.map(h => h.name.toUpperCase());
                const colMap = {
                    ordem: headers.indexOf('ORDEM'),
                    anoBase: headers.indexOf('ANO_BASE'),
                    anoAnt: headers.indexOf('ANO_ANT'),
                    anoAtual: headers.indexOf('ANO_ATUAL')
                };

                if (Object.values(colMap).some(index => index === -1)) {
                    throw new Error("A query não retornou as colunas esperadas: ORDEM, ANO_BASE, ANO_ANT, ANO_ATUAL.");
                }

                const rawData = {};
                result.data.forEach(row => {
                    const ordem = row[colMap.ordem];
                    rawData[ordem] = {
                        base: parseFloat(row[colMap.anoBase]) || 0,
                        anterior: parseFloat(row[colMap.anoAnt]) || 0,
                        atual: parseFloat(row[colMap.anoAtual]) || 0
                    };
                });

                // 4. Mapear dados processados para nomes legíveis
                const d = {
                    capital: rawData['1'] || { base: 0, anterior: 0, atual: 0 },
                    distribuidos: rawData['2'] || { base: 0, anterior: 0, atual: 0 },
                    lucro: rawData['3'] || { base: 0, anterior: 0, atual: 0 },
                    ajuste: rawData['4'] || { base: 0, anterior: 0, atual: 0 },
                    acumulados: rawData['5'] || { base: 0, anterior: 0, atual: 0 }
                };
                
                // 5. Realizar os cálculos
                const reportData = { years };

                // Saldo Base (Ano - 2)
                reportData.saldoBase = {
                    capital: d.capital.base,
                    ajuste: 0, // Ajuste começa em zero no primeiro saldo
                    acumulados: d.acumulados.base,
                    get total() { return this.capital + this.ajuste + this.acumulados; }
                };

                // Movimentações do Ano Anterior (Ano - 1)
                reportData.movAnt = {
                    distribuidos: d.distribuidos.anterior,
                    lucro: d.lucro.anterior,
                    ajuste: d.ajuste.anterior
                };

                // Saldo Anterior (Ano - 1)
                reportData.saldoAnt = {
                    capital: reportData.saldoBase.capital,
                    ajuste: reportData.saldoBase.ajuste + reportData.movAnt.ajuste,
                    acumulados: reportData.saldoBase.acumulados + reportData.movAnt.lucro + reportData.movAnt.distribuidos,
                    get total() { return this.capital + this.ajuste + this.acumulados; }
                };
                
                // Movimentações do Ano Atual (Ano)
                reportData.movAtual = {
                    distribuidos: d.distribuidos.atual,
                    lucro: d.lucro.atual,
                    ajuste: d.ajuste.atual
                };

                // Saldo Atual (Final)
                reportData.saldoAtual = {
                    capital: reportData.saldoAnt.capital,
                    ajuste: reportData.saldoAnt.ajuste + reportData.movAtual.ajuste,
                    acumulados: reportData.saldoAnt.acumulados + reportData.movAtual.lucro + reportData.movAtual.distribuidos,
                    get total() { return this.capital + this.ajuste + this.acumulados; }
                };

                // 6. Renderizar o relatório com os dados calculados
                renderReport(reportData);

            } catch (error) {
                console.error("Erro ao gerar relatório DMPL:", error);
                renderError(error.message || "Ocorreu um erro ao carregar os dados do relatório.");
            }
        }

        function initializeComponent() {
            document.body.addEventListener(MITRA_UPDATE_EVENT_NAME, fetchDataAndRender);
            fetchDataAndRender();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const waitForMitraAndInit = () => {
                const maxWaitTime = 5000;
                const intervalTime = 100;
                const startTime = Date.now();

                const checkInterval = setInterval(() => {
                    if (window.componentData && componentData.queryDados && componentData.varMes) {
                        clearInterval(checkInterval);
                        initializeComponent();
                    } else if (Date.now() - startTime > maxWaitTime) {
                        clearInterval(checkInterval);
                        const errorMsg = "Erro Crítico: As configurações do componente (queryDados, varMes) não foram carregadas da plataforma.";
                        console.error(errorMsg);
                        renderError(errorMsg);
                    }
                }, intervalTime);
            };

            waitForMitraAndInit();
        });
    </script>
</body>
</html>
